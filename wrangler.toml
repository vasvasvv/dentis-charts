# Cloudflare Pages + Functions configuration
# This enables Advanced Mode where worker.ts handles API routes

name = "dentis-cards"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "dist"

# Enable Advanced Mode with _worker.js
[build]
command = "npm run build"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "dentis-charts"
database_id = "your-database-id-here"

# Environment variables
[vars]
# JWT_SECRET should be set via Cloudflare Dashboard > Pages > Settings > Environment Variables
# For local dev, use .dev.vars file
JWT_SECRET має бути встановлений через wrangler secret put JWT_SECRET
# Для локальної розробки використовуйте .dev.vars файл
