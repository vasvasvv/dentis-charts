# Cloudflare Pages configuration
# This file is used for deploying the Hono API worker separately
# For the main React app deployment, use Cloudflare Pages with build command: npm run build

name = "dentis-cards-api"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Remove this section to avoid conflicts with Pages
# [build]
# command = "npm run build"

# [build.upload]
# format = "modules"
# main = "./src/worker.ts"

[[d1_databases]]
binding = "DB"
database_name = "dentis-charts"
# database_id буде додано через Cloudflare Dashboard або wrangler

# JWT_SECRET має бути встановлений через wrangler secret put JWT_SECRET
# Для локальної розробки використовуйте .dev.vars файл
